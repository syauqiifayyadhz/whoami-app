name: CI - Build & Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. ambil source code dari repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. build image
      - name: Build Docker image
        run: docker build -t syauqiifayyadhz/whoami-app:v2 .

      # 4. push image ke Docker Hub
      - name: Push Docker image
        run: docker push syauqiifayyadhz/whoami-app:v2

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig.yaml
          export KUBECONFIG=$PWD/kubeconfig.yaml

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/whoami-app \
          whoami-app=syauqiifayyadhz/whoami-app:v2 -n apps
